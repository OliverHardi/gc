<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | Schoology</title>
    <link rel="icon" type="image/x-icon" href="favicons/favicon.ico">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
</head>
<body>

    <div id="signInScreen">
        <h2>Welcome</h2>
        <input id="usernameInput" placeholder="Enter your username" />
        <button id="signInBtn">Sign In</button> </div>
    </div>

    <div id="chatScreen" style="display:none">
        <div id="chatSidebar">
            <h3>Online Users</h3>
            <ul id="membersList"></ul>
        </div>
        <div id="chatMain">
            <div id="roomDisplay"></div>
            <div id="chatbox"></div>
            <div id="inputWrapper">
                <button id="emojiBtn" type="button">😀</button>

                <input id="messageInput"  placeholder="Type a message..." />
                <button id="sendButton">Send</button>
                
                <div id="emojiPickerContainer" style="display: none; position: absolute; bottom: 50px; left: 0; z-index: 100;">
                    <emoji-picker></emoji-picker>
                </div>
            </div>
        </div>
        
    </div>



    <script type="module" src="script.js" defer></script>

</body>
</html>
