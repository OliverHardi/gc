<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>schoologty</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #chatbox { width: 100%; height: 200px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="signInScreen">
        <h2>Welcome to Chat</h2>
        <button id="signInBtn">Sign in with Google</button>
    </div>

    <div id="chatScreen" style="display:none">
        <div id="roomDisplay"></div>
        <div id="chatbox"></div>
        <input id="messageInput" disabled placeholder="Type a message..." />
        <button id="sendButton" disabled>Send</button>
    </div>
    
    <div>
        <p id="roomDisplay">Loading...</p>
    </div>

    <hr>

    <!-- <div id="chatbox"></div> -->
    <input type="text" id="messageInput" placeholder="Type a message..." disabled>
    <button id="sendButton" disabled>Send</button>

    <script type="module" src="script.js" defer></script>

</body>
</html>
